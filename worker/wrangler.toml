name               = "leraffl-gallery-feedback"
main               = "index.js"
compatibility_date = "2026-04-25"
account_id         = "20d1cbcabbe991286927c4e790c8b528"
preview_urls       = false

[observability]
enabled = true

[observability.logs]
enabled = true

[vars]
GITHUB_OWNER = "leraffl"
GITHUB_REPO  = "leraffl-gallery"

# Rate-limit KV namespace (created via `npx wrangler@latest kv namespace create RATE_KV`)
[[kv_namespaces]]
binding = "RATE_KV"
id      = "88b72d5db6444ed2860f0ce5787c0836"

# Secret: GITHUB_TOKEN — fine-grained PAT on LeRaffl/LeRaffl-Gallery with
#   Issues: Read+Write, Contents: Read+Write, Pull requests: Read+Write,
#   Metadata: Read.
# Set with: npx wrangler@latest secret put GITHUB_TOKEN

# Secret: AUSTRIA_RELAY_TOKEN (optional) — shared secret gating GET /fetch, the
#   host-allowlisted fetch relay the Austria fetcher uses to reach Statistik
#   Austria (which blocks GitHub's IPs). The fetch-austria.yml workflow sends it
#   as the X-Relay-Token header. Use the same value for the GH Actions secret
#   AUSTRIA_RELAY_TOKEN. Set with: npx wrangler@latest secret put AUSTRIA_RELAY_TOKEN
