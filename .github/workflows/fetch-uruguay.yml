name: Fetch Uruguay data (ACAU)

# Scrapes the latest ACAU "Compilado <year>" xlsx and upserts new months into
# the per-variant CSVs (Whole/Vans/HDV/Buses). Runs daily from the 1st of each
# month — the script self-throttles via the latest period already present
# in each CSV, so most invocations are a no-op until ACAU publishes the
# previous month's data inside the Compilado workbook.
# When any CSV changes, render-country.yml is dispatched for each changed variant.

on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Compilado year (leave empty for the year of the previous calendar month)'
        required: false
        default: ''
      url:
        description: 'Direct Compilado xlsx URL or local path (leave empty to auto-discover)'
        required: false
        default: ''
      variant:
        description: 'Variant to fetch: whole, vans, hdv, buses, all (default: all)'
        required: false
        default: ''
      force:
        description: 'Re-process months that already exist in the CSV'
        required: false
        default: 'false'
        type: boolean
  schedule:
    - cron: '10 8 1-31 * *'   # daily at 08:10 UTC, from the 1st onward (staggered to avoid 08:00 pile-up)

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 openpyxl

      - name: Fetch & update Uruguay CSVs
        run: |
          python scripts/fetch_uruguay.py \
            ${YEAR:+--year "$YEAR"} \
            ${URL:+--url "$URL"} \
            ${VARIANT:+--variant "$VARIANT"} \
            ${FORCE:+--force}
        env:
          YEAR: ${{ inputs.year }}
          URL: ${{ inputs.url }}
          VARIANT: ${{ inputs.variant }}
          FORCE: ${{ inputs.force == true && '1' || '' }}

      - name: Commit if changed
        id: commit
        uses: EndBug/add-and-commit@v9
        with:
          add: >
            data/Uruguay.csv
            data/Uruguay_Vans.csv
            data/Uruguay_HDV.csv
            data/Uruguay_Buses.csv
          message: 'chore: update Uruguay data from ACAU'
          default_author: github_actions

      - name: Trigger renders for changed variants
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for vdef in "Whole:data/Uruguay.csv" "Vans:data/Uruguay_Vans.csv" "HDV:data/Uruguay_HDV.csv" "Buses:data/Uruguay_Buses.csv"; do
            variant="${vdef%%:*}"
            file="${vdef##*:}"
            if git show --stat HEAD | grep -qF "$file"; then
              gh workflow run render-country.yml \
                --ref "${GITHUB_REF_NAME}" \
                -f country=Uruguay \
                -f variant="$variant"
            fi
          done
