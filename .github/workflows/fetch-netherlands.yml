name: Fetch Netherlands data (RDW via Swing)

# Fetches three workspace pivots from duurzamemobiliteit.databank.nl (RDW data
# served via the Swing 7.1 BI platform) and upserts new monthly rows into
# data/Netherlands.csv for three variants:
#
#   * Whole         — Instroom Personenauto Nieuw
#   * Used Imports  — Instroom Personenauto Occasion import (>90 + <=90 dgn)
#   * HDV           — Instroom Zware bedrijfsvoertuigen Nieuw
#
# Each variant is fetched from a pre-saved Swing workspace template (configured
# in the Swing UI via the share-icon → permalink mechanism). See the docstring
# in scripts/fetch_netherlands.py for details. If the CSV changed, this workflow
# dispatches render-country.yml once per touched variant.

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Variant to fetch (default: all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - whole
          - used
          - hdv
  schedule:
    # Daily 1st–15th at 06:30 UTC. RDW's publication date varies (sometime in
    # the first half of the following month), so we poll daily until the
    # previous month's row materialises in the CSV, then idempotent re-fetches
    # produce no diff (no commit, no render trigger). 06:30 UTC keeps us clear
    # of fetch-brazil's 08:00 UTC slot and most country-side timezones.
    - cron: '30 6 1-15 * *'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ------------------------------------------------------------------
      # TEMPORARY DIAGNOSTICS for the persistent errno-101 failures since
      # 2026-06-01 — branch-only change, will be reverted before merge.
      # ------------------------------------------------------------------
      - name: DNS resolution
        run: |
          echo "=== getent ahosts ==="
          getent ahosts duurzamemobiliteit.databank.nl || echo "getent rc=$?"
          echo "=== python getaddrinfo (order as urllib3 sees it) ==="
          python3 -c "
          import socket
          for fam, typ, proto, cname, addr in socket.getaddrinfo('duurzamemobiliteit.databank.nl', 443, type=socket.SOCK_STREAM):
              print(socket.AddressFamily(fam).name, addr)
          "

      - name: Runner IPv6 connectivity
        run: |
          ip -6 addr show scope global || true
          ip -6 route show default || echo "NO IPv6 DEFAULT ROUTE"

      - name: curl IPv4 only
        run: |
          curl -4 -sv --max-time 25 https://duurzamemobiliteit.databank.nl/ -o /dev/null 2>&1 | tail -25 || echo "curl -4 rc=$?"

      - name: curl IPv6 only
        run: |
          curl -6 -sv --max-time 25 https://duurzamemobiliteit.databank.nl/ -o /dev/null 2>&1 | tail -15 || echo "curl -6 rc=$?"

      - name: curl default
        run: |
          curl -sv --max-time 25 "https://duurzamemobiliteit.databank.nl/viewer?workspace_guid=a7d36cf5-9dd3-4eca-96e9-9e1b991af9ba" -o /dev/null 2>&1 | tail -25 || echo "curl rc=$?"

      - name: python requests (same code path as fetch script)
        run: |
          pip install requests --quiet
          python3 -c "
          import requests
          try:
              r = requests.get('https://duurzamemobiliteit.databank.nl/', timeout=25)
              print('OK', r.status_code, len(r.content), 'bytes')
          except Exception as e:
              print('FAIL:', type(e).__name__, e)
          "
