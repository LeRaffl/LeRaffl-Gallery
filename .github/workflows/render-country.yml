name: Render country charts

# Manual trigger from the Actions UI. After data/<Country>.csv is updated
# (typically via a merged Submit-Data PR), pick the country here and the
# four PNGs + params.csv + weights.csv are regenerated and committed.
# The Build manifest workflow then picks up the new images automatically.

on:
  workflow_dispatch:
    inputs:
      country:
        description: 'Country (filename in data/, e.g. "Germany")'
        required: true
        type: string
      variant:
        description: 'Variant (default Whole)'
        required: false
        default: 'Whole'
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: render-${{ inputs.country }}-${{ inputs.variant }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            ggplot2
            scales
            grid
            png
            ggtext
            viridis
            showtext
            sysfonts
            glue

      - name: Render
        run: |
          Rscript R/render_country.R "${{ inputs.country }}" "${{ inputs.variant }}"

      - name: Commit outputs
        uses: EndBug/add-and-commit@v9
        with:
          add: |
            images
            params.csv
            weights.csv
          message: "chore: render ${{ inputs.country }} (${{ inputs.variant }})"
          default_author: github_actions
