name: Render country charts

# Manual trigger from the Actions UI. After data/<Country>.csv is updated
# (typically via a merged Submit-Data PR), pick the country here and the
# four PNGs + params.csv + weights.csv are regenerated and committed.
# The Build manifest workflow is dispatched after the render commit.
#
# Also exposed as `workflow_call` so multi-country fetchers (fetch-acea.yml)
# can fan it out via a matrix with `max-parallel: 1` for a strict serial
# rendering chain across all changed countries.

# Stamp the country (and variant if non-default) into the run name so the
# Actions UI lists "Render: Brazil" / "Render: Germany (Private)" instead
# of 20 identical "Render country charts" entries.
run-name: >-
  Render: ${{ inputs.country }}${{ inputs.variant != '' && inputs.variant != 'Whole' && format(' ({0})', inputs.variant) || '' }}

on:
  workflow_dispatch:
    inputs:
      country:
        description: 'Country (filename in data/, e.g. "Germany")'
        required: true
        type: string
      variant:
        description: 'Variant (default Whole)'
        required: false
        default: 'Whole'
        type: string
  workflow_call:
    inputs:
      country:
        description: 'Country (filename in data/)'
        required: true
        type: string
      variant:
        description: 'Variant (default Whole)'
        required: false
        default: 'Whole'
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    concurrency:
      group: render-${{ inputs.country }}-${{ inputs.variant }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            ggplot2
            scales
            grid
            png
            ggtext
            viridis
            showtext
            sysfonts
            glue

      - name: Render
        run: |
          Rscript R/render_country.R "${{ inputs.country }}" "${{ inputs.variant }}"

      - name: Commit outputs
        uses: EndBug/add-and-commit@v9
        with:
          add: |
            images
            params.csv
            weights.csv
            posts
          message: "chore: render ${{ inputs.country }} (${{ inputs.variant }})"
          default_author: github_actions

      - name: Trigger manifest build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run build-manifest.yml --ref "${GITHUB_REF_NAME}"
