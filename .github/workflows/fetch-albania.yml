name: Fetch Albania data (dpshtrr.al Looker Studio report)

# Drives a headless Chromium (Playwright) to load the DPSHTRR public Looker
# Studio report as a visitor would, then intercepts the batchedDataV2 responses
# the report itself issues and upserts data/Albania.csv.  The plain-HTTP API is
# access-gated (PREFETCH_VALIDATION); a real browser session is required.
# Runs daily from the 10th onward; commit-gated so steady-state runs are a no-op.
#
# Report: lookerstudio.google.com/reporting/407ce08b-d3ce-478e-9bc7-a50125f875f3
# Page:   VPWqB  (Vehicles by type of fuel or power source)
# Source playbook: docs/architecture/27-source-albania.md

on:
  workflow_dispatch:
    inputs:
      year_from:
        description: 'First year to fetch (default: current year). Use 2019-2025 for backfill.'
        required: false
      year_to:
        description: 'Last year to fetch (default: current year). Set same as year_from for one year.'
        required: false
      variants:
        description: 'Comma-separated variants to WRITE (default: all). For backfill use HDV,Buses,2-Wheelers to leave Whole untouched.'
        required: false
      since:
        description: 'Only upsert months >= this YYYY-MM (leave empty for all)'
        required: false
      dry_run:
        description: 'Fetch and print, but do not write the CSV'
        required: false
        default: 'false'
        type: boolean

  schedule:
    - cron: '0 7 10-28 * *'   # daily at 07:00 UTC from the 10th onward

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      committed: ${{ steps.commit.outputs.committed }}
      variants_json: ${{ steps.variants.outputs.variants_json }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests playwright
          python -m playwright install --with-deps chromium

      - name: Fetch Albania data
        env:
          ALBANIA_DEBUG: ${{ inputs.dry_run == true && '1' || '0' }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.year_from }}" ]; then ARGS="$ARGS --year-from ${{ inputs.year_from }}"; fi
          if [ -n "${{ inputs.year_to }}"   ]; then ARGS="$ARGS --year-to   ${{ inputs.year_to }}"; fi
          if [ -n "${{ inputs.variants }}"  ]; then ARGS="$ARGS --variants ${{ inputs.variants }}"; fi
          if [ -n "${{ inputs.since }}"     ]; then ARGS="$ARGS --since ${{ inputs.since }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python scripts/fetch_albania.py $ARGS

      - name: Commit if changed
        id: commit
        uses: EndBug/add-and-commit@v9
        with:
          add: data/Albania.csv
          message: 'chore: update Albania data from dpshtrr.al'
          default_author: github_actions

      # Which variants to render: the explicit --variants subset if given,
      # else all four. Emitted as a JSON array for the render matrix below.
      - name: Determine variants to render
        id: variants
        run: |
          if [ -n "${{ inputs.variants }}" ]; then
            IFS=',' read -ra arr <<< "${{ inputs.variants }}"
          else
            arr=(Whole HDV Buses 2-Wheelers)
          fi
          json=$(printf '%s\n' "${arr[@]}" | jq -R . | jq -cs .)
          echo "variants_json=$json" >> "$GITHUB_OUTPUT"
          echo "Will render: $json"

  # Render the touched variants SERIALLY. Each render commits the shared
  # params.csv / weights.csv (plus images/ and posts/), so parallel variants
  # race on the rebase-push and abort with "conflicting files". max-parallel: 1
  # mirrors fetch-finland.yml / fetch-acea.yml.
  render:
    needs: fetch
    if: needs.fetch.outputs.committed == 'true'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        variant: ${{ fromJson(needs.fetch.outputs.variants_json) }}
    uses: ./.github/workflows/render-country.yml
    with:
      country: Albania
      variant: ${{ matrix.variant }}
    secrets: inherit
