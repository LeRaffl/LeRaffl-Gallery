name: Fetch Austria data (Statistik Austria DE2 / DE3)

# Fetches Statistik Austria's monthly cumulative ODS publications and upserts
# three per-variant CSVs:
#
#   * Whole — Pkw Klasse M1 (data/Austria.csv), from DE2 Tabelle 2 with the
#             "darunter Plug-In" rows that let us split PHEV vs HEV.
#   * HDV   — Lkw N2 + N3 + Sattelzugfahrzeuge (data/Austria_HDV.csv), from
#             DE3 vehicle-class × fuel matrix; PHEV blank, HEV holds combined
#             Plug-In + full hybrid (source lumps them at Lkw row level).
#   * Vans  — Lkw N1, ≤ 3.5 t (data/Austria_Vans.csv), same DE3 layout as HDV.
#
# See scripts/fetch_austria.py for the file URLs, label mappings, and the
# per-variant backfill envelope (HDV/Vans monthly only from 2025-01 onward;
# 2024 is annual; pre-2024 not published).
#
# Statistik Austria publishes the prior-month cumulative file around the
# 10th–14th of the month at 07–09 UTC (verified from last-modified headers).
# The 09:25 UTC schedule sits just after that window; per-variant early-exit
# in the script makes subsequent daily runs cheap no-ops.

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Variant to fetch (default: all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - whole
          - hdv
          - vans
      year:
        description: 'Year to refetch (optional)'
        required: false
        type: string
      force:
        description: 'Skip the "already current" early-exit check'
        required: false
        default: false
        type: boolean
  schedule:
    # Daily 8th–22nd at 09:25 UTC. Window covers the typical mid-month
    # publication slot with buffer for early/late releases.
    - cron: '25 9 8-22 * *'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        # requests[socks] so AUSTRIA_PROXY may be a socks5:// URL as well as http(s)://.
        run: pip install "requests[socks]"

      - name: Fetch & update Austria CSVs
        # Statistik Austria blocks GitHub's datacenter IPs. Requests are routed
        # through the Cloudflare Worker fetch relay (AUSTRIA_FETCH_RELAY, e.g.
        # https://<worker-host>/fetch?url=, gated by AUSTRIA_RELAY_TOKEN), which
        # egresses from a non-blocked IP. AUSTRIA_PROXY is an optional fallback
        # (a real http(s):///socks5:// proxy) if the relay egress is also
        # blocked. With none set the fetch fails fast with a clear message.
        run: |
          python scripts/fetch_austria.py \
            ${VARIANT:+--variant "$VARIANT"} \
            ${YEAR:+--year "$YEAR"} \
            ${FORCE:+--force}
        env:
          VARIANT: ${{ inputs.variant }}
          YEAR: ${{ inputs.year }}
          FORCE: ${{ inputs.force == true && '1' || '' }}
          AUSTRIA_FETCH_RELAY: ${{ secrets.AUSTRIA_FETCH_RELAY }}
          AUSTRIA_RELAY_TOKEN: ${{ secrets.AUSTRIA_RELAY_TOKEN }}
          AUSTRIA_PROXY: ${{ secrets.AUSTRIA_PROXY }}

      - name: Detect which CSVs changed
        id: changed
        run: |
          touched=()
          for pair in "Whole:data/Austria.csv" \
                     "HDV:data/Austria_HDV.csv" \
                     "Vans:data/Austria_Vans.csv"; do
            variant="${pair%%:*}"
            file="${pair##*:}"
            [ -f "$file" ] || continue
            git add -N "$file" 2>/dev/null || true
            if ! git diff --quiet -- "$file"; then
              touched+=("$variant")
            fi
          done
          variants=$(IFS='|'; echo "${touched[*]}")
          echo "variants=$variants" >> "$GITHUB_OUTPUT"
          echo "Touched variants: ${variants:-<none>}"

      - name: Commit if changed
        id: commit
        uses: EndBug/add-and-commit@v9
        with:
          add: |
            data/Austria.csv
            data/Austria_HDV.csv
            data/Austria_Vans.csv
          message: 'chore: update Austria data from Statistik Austria (DE2/DE3)'
          default_author: github_actions

      - name: Trigger render per touched variant
        if: steps.commit.outputs.committed == 'true' && steps.changed.outputs.variants != ''
        env:
          GH_TOKEN: ${{ github.token }}
          VARIANTS: ${{ steps.changed.outputs.variants }}
        run: |
          IFS='|' read -ra arr <<< "$VARIANTS"
          for variant in "${arr[@]}"; do
            echo "Dispatching render for variant: $variant"
            gh workflow run render-country.yml \
              --ref "${GITHUB_REF_NAME}" \
              -f country=Austria \
              -f variant="$variant"
          done
