name: Fetch Austria data (Statistik Austria DE2 / DE3)

# TEMPORARY: this workflow is diverted to the OGD discovery probe on the
# claude/austria-data-fetch-error-5We96 branch. Dispatch it with that ref to
# verify data.statistik.gv.at reachability from the runner and dump the OGD
# dataset structure. The real fetch steps are restored after the migration.

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Variant to fetch (default: all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - whole
          - hdv
          - vans
      year:
        description: 'Year to refetch (optional)'
        required: false
        type: string
      force:
        description: 'Skip the "already current" early-exit check'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '25 9 8-22 * *'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: OGD discovery probe (TEMP)
        run: python scripts/_austria_ogd_probe.py
