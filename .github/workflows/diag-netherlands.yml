name: Diag Netherlands connectivity (temporary)

# Temporary diagnostic for the persistent errno-101 failures of
# fetch-netherlands.yml since 2026-06-01. Dispatched manually on the
# feature branch; will be removed once the root cause is identified.

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: DNS resolution
        run: |
          echo "=== getent ahosts ==="
          getent ahosts duurzamemobiliteit.databank.nl || echo "getent failed: $?"
          echo "=== python getaddrinfo (order as urllib3 sees it) ==="
          python3 -c "
          import socket
          for fam, typ, proto, cname, addr in socket.getaddrinfo('duurzamemobiliteit.databank.nl', 443, type=socket.SOCK_STREAM):
              print(socket.AddressFamily(fam).name, addr)
          "
      - name: IPv6 connectivity of runner
        run: |
          ip -6 addr show scope global || true
          ip -6 route show default || echo "NO IPv6 DEFAULT ROUTE"
      - name: curl IPv4 only
        run: |
          curl -4 -sv --max-time 25 https://duurzamemobiliteit.databank.nl/ -o /dev/null 2>&1 | tail -25 || echo "curl -4 exit: $?"
      - name: curl IPv6 only
        run: |
          curl -6 -sv --max-time 25 https://duurzamemobiliteit.databank.nl/ -o /dev/null 2>&1 | tail -15 || echo "curl -6 exit: $?"
      - name: curl default (happy eyeballs)
        run: |
          curl -sv --max-time 25 "https://duurzamemobiliteit.databank.nl/viewer?workspace_guid=a7d36cf5-9dd3-4eca-96e9-9e1b991af9ba" -o /dev/null 2>&1 | tail -25 || echo "curl exit: $?"
      - name: python requests (same code path as fetch script)
        run: |
          pip install requests --quiet
          python3 -c "
          import requests
          try:
              r = requests.get('https://duurzamemobiliteit.databank.nl/', timeout=25)
              print('OK', r.status_code)
          except Exception as e:
              print('FAIL:', type(e).__name__, e)
          "
