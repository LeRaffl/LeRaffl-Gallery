name: Backfill Italy Rental + NonRental history (UNRAE)

# One-shot workflow to populate Italy_Rental.csv and Italy_NonRental.csv
# with all historical months that fetch-italy.yml never processed (it only
# ever fetches the latest bulletin).
#
# Step 1 — Rental backfill:
#   Crawls unrae.it for every struttura-del-mercato PDF back to `from_year`,
#   downloads each one missing from Italy_Rental.csv, parses both
#   'Per alimentazione' blocks, and writes Rental = Whole − (al netto del
#   noleggio).  Pre-2017 PDFs lack the non-rental section and are skipped.
#
# Step 2 — NonRental derivation:
#   Derives NonRental = Whole − Rental for every period present in both
#   Italy.csv and Italy_Rental.csv.  No PDF downloads needed.
#
# Results go to a new branch and a PR is opened automatically.
#
# See scripts/backfill_italy_rental.py, scripts/backfill_italy_nonrental.py,
# and docs/architecture/18-source-italy.md.

on:
  workflow_dispatch:
    inputs:
      from_year:
        description: 'Earliest year to attempt (default: 2017)'
        required: false
        default: '2017'
        type: string
      force:
        description: 'Re-parse and overwrite periods already in the CSV'
        required: false
        default: 'false'
        type: boolean
      dry_run:
        description: 'List missing periods without downloading PDFs'
        required: false
        default: 'false'
        type: boolean

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install poppler (pdftotext)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends poppler-utils

      - name: Install Python dependencies
        run: pip install requests

      - name: Backfill Italy_Rental.csv (UNRAE PDFs)
        run: |
          python scripts/backfill_italy_rental.py \
            --from-year "$FROM_YEAR" \
            ${FORCE:+--force} \
            ${DRY_RUN:+--dry-run}
        env:
          FROM_YEAR: ${{ inputs.from_year || '2017' }}
          FORCE:     ${{ inputs.force == true && '1' || '' }}
          DRY_RUN:   ${{ inputs.dry_run == true && '1' || '' }}

      - name: Derive Italy_NonRental.csv (Whole − Rental)
        if: inputs.dry_run != true
        run: |
          python scripts/backfill_italy_nonrental.py \
            ${FORCE:+--force}
        env:
          FORCE: ${{ inputs.force == true && '1' || '' }}

      - name: Create branch, commit and open PR
        if: inputs.dry_run != true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -N data/Italy_Rental.csv data/Italy_NonRental.csv
          if git diff --quiet -- data/Italy_Rental.csv data/Italy_NonRental.csv; then
            echo "CSVs already up to date — nothing to commit."
            exit 0
          fi

          BRANCH="backfill/italy-rental-nonrental-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add data/Italy_Rental.csv data/Italy_NonRental.csv
          git commit -m "data: backfill Italy Rental + NonRental 2017-2020 from UNRAE PDFs

Adds monthly rows from 2017-01 through 2020-12 to Italy_Rental.csv and
Italy_NonRental.csv.  Data sourced identically to the live fetcher:
  Rental    = Whole - (al netto del noleggio)  [UNRAE struttura PDF]
  NonRental = Whole - Rental                   [arithmetic, no extra download]
Pre-2017 PDFs lack the non-rental Per-alimentazione section and are skipped."
          git push -u origin "$BRANCH"

          gh pr create \
            --title "data: backfill Italy Rental + NonRental 2017-2020" \
            --base master \
            --head "$BRANCH" \
            --body "## What

Adds monthly data for **2017-01 through 2020-12** to Italy_Rental.csv and Italy_NonRental.csv -- periods missing because the live fetcher only processes the latest UNRAE bulletin.

## Source & method

| File | Method |
|---|---|
| Italy_Rental.csv | UNRAE Struttura del mercato PDFs -- same parsing as live fetcher: Rental = Whole - (al netto del noleggio) |
| Italy_NonRental.csv | Arithmetic derivation: NonRental = Whole - Rental -- no additional downloads |

Pre-2017 PDFs lack the al netto del noleggio fuel table and are automatically skipped.

## Why

Rental and NonRental had no data before 2021. Adding 2017-2020 gives ~48 monthly rows per variant, covering the low-BEV baseline the model needs to fit the EV adoption curve correctly.

## Generated by

scripts/backfill_italy_rental.py + scripts/backfill_italy_nonrental.py via the backfill-italy-rental.yml one-shot workflow."
