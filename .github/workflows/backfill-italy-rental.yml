name: Backfill Italy Rental + NonRental history (UNRAE)

# One-shot workflow: populates Italy_Rental.csv and Italy_NonRental.csv
# for all historical months not yet in the CSVs (typically 2017-2020).
#
# Step 1 - Rental: crawls UNRAE struttura PDFs, parses
#   Rental = Whole - (al netto del noleggio). Pre-2017 PDFs skipped.
# Step 2 - NonRental: derives NonRental = Whole - Rental (no downloads).
# Step 3 - opens a PR with the two updated CSVs.
#
# See scripts/backfill_italy_rental.py, scripts/backfill_italy_nonrental.py

on:
  workflow_dispatch:
    inputs:
      from_year:
        description: 'Earliest year to attempt (default: 2017)'
        required: false
        default: '2017'
        type: string
      force:
        description: 'Re-parse and overwrite periods already in the CSV'
        required: false
        default: 'false'
        type: boolean
      dry_run:
        description: 'List missing periods without downloading PDFs'
        required: false
        default: 'false'
        type: boolean

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install poppler (pdftotext)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends poppler-utils

      - name: Install Python dependencies
        run: pip install requests

      - name: Backfill Italy_Rental.csv (UNRAE PDFs)
        run: |
          python scripts/backfill_italy_rental.py \
            --from-year "$FROM_YEAR" \
            ${FORCE:+--force} \
            ${DRY_RUN:+--dry-run}
        env:
          FROM_YEAR: ${{ inputs.from_year || '2017' }}
          FORCE:     ${{ inputs.force == true && '1' || '' }}
          DRY_RUN:   ${{ inputs.dry_run == true && '1' || '' }}

      - name: Derive Italy_NonRental.csv (Whole minus Rental)
        if: inputs.dry_run != true
        run: |
          python scripts/backfill_italy_nonrental.py \
            ${FORCE:+--force}
        env:
          FORCE: ${{ inputs.force == true && '1' || '' }}

      - name: Create branch, commit and open PR
        if: inputs.dry_run != true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -N data/Italy_Rental.csv data/Italy_NonRental.csv
          if git diff --quiet -- data/Italy_Rental.csv data/Italy_NonRental.csv; then
            echo "CSVs already up to date — nothing to commit."
            exit 0
          fi

          BRANCH="backfill/italy-rental-nonrental-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add data/Italy_Rental.csv data/Italy_NonRental.csv
          git commit -m "data: backfill Italy Rental + NonRental 2017-2020 from UNRAE PDFs"
          git push -u origin "$BRANCH"

          cat > /tmp/pr_body.md << 'MDEOF'
          ## What

          Adds monthly data for **2017-01 through 2020-12** to `Italy_Rental.csv`
          and `Italy_NonRental.csv` — periods missing because the live fetcher only
          processes the latest UNRAE bulletin.

          ## Source & method

          - **Rental**: UNRAE Struttura del mercato PDFs, same parsing as live
            fetcher (`Rental = Whole - al netto del noleggio`, exact subtraction)
          - **NonRental**: arithmetic derivation (`NonRental = Whole - Rental`,
            no additional downloads needed)
          - Pre-2017 PDFs lack the non-rental fuel table and are skipped

          ## Why

          Rental and NonRental had no data before 2021. Adding 2017-2020 gives
          ~48 monthly rows per variant, covering the low-BEV baseline the model
          needs to fit the EV adoption curve correctly.

          ## Generated by

          `scripts/backfill_italy_rental.py` + `scripts/backfill_italy_nonrental.py`
          via the `backfill-italy-rental.yml` one-shot workflow.
          MDEOF

          gh pr create \
            --title "data: backfill Italy Rental + NonRental 2017-2020" \
            --base master \
            --head "$BRANCH" \
            --body-file /tmp/pr_body.md
