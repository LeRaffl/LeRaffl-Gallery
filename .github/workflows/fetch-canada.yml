name: Fetch Canada data (StatCan WDS)

# Fetches new motor-vehicle registrations from Statistics Canada's Web Data
# Service (cube 20-10-0025 "New motor vehicle registrations") and upserts the
# latest quarters into per-variant CSVs:
#
#   * Whole    — Passenger cars + Multi-purpose vehicles (= EU M1) -> data/Canada.csv
#   * Pickups  — Pickup trucks                                     -> data/Canada_Pickups.csv
#   * Vans     — minivans + cargo vans                             -> data/Canada_Vans.csv
#   (light-vehicle cube — no heavy trucks or buses. See the script + doc for the
#    M1 harmonisation and the definition change from passenger-cars-only.)
#
# StatCan revises recent quarters, so the script always re-fetches the latest N
# quarters; the commit step is change-gated, making steady-state runs a no-op.
# When a CSV changes, this workflow dispatches render-country.yml once per
# touched variant.
#
# See scripts/fetch_canada.py for the WDS coordinate/fuel mapping, and
# docs/architecture/17-source-canada.md for the full pipeline context.

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Variant to fetch (default: all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - Whole
          - Pickups
          - Vans
      latest_n:
        description: 'Quarters to fetch per fuel (default 16; use e.g. 60 to seed a new variant)'
        required: false
        default: ''
  schedule:
    # StatCan releases this quarterly cube ~2.5 months after quarter-end, i.e.
    # roughly mid-March / June / September / December (the 20-10-0025 release
    # for Q4 2025 landed 2026-03-12). Poll daily on days 8-20 of just those four
    # months; the change-gated commit makes every run a no-op until the new
    # quarter actually lands. 06:40 UTC stays clear of the other fetchers.
    - cron: '40 6 8-20 3,6,9,12 *'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch & update Canada CSVs
        run: |
          python scripts/fetch_canada.py \
            ${VARIANT:+--variant "$VARIANT"} \
            ${LATEST_N:+--latest-n "$LATEST_N"}
        env:
          VARIANT: ${{ inputs.variant }}
          LATEST_N: ${{ inputs.latest_n }}

      - name: Detect which CSVs changed
        id: changed
        run: |
          touched=()
          for pair in "Whole:data/Canada.csv" \
                     "Pickups:data/Canada_Pickups.csv" \
                     "Vans:data/Canada_Vans.csv"; do
            variant="${pair%%:*}"
            file="${pair##*:}"
            [ -f "$file" ] || continue
            git add -N "$file" 2>/dev/null || true
            if ! git diff --quiet -- "$file"; then
              touched+=("$variant")
            fi
          done
          variants=$(IFS='|'; echo "${touched[*]}")
          echo "variants=$variants" >> "$GITHUB_OUTPUT"
          echo "Touched variants: ${variants:-<none>}"

      - name: Commit if changed
        id: commit
        uses: EndBug/add-and-commit@v9
        with:
          add: |
            data/Canada.csv
            data/Canada_Pickups.csv
            data/Canada_Vans.csv
          message: 'chore: update Canada data from 150.statcan.gc.ca'
          default_author: github_actions

      - name: Trigger render per touched variant
        if: steps.commit.outputs.committed == 'true' && steps.changed.outputs.variants != ''
        env:
          GH_TOKEN: ${{ github.token }}
          VARIANTS: ${{ steps.changed.outputs.variants }}
        run: |
          IFS='|' read -ra arr <<< "$VARIANTS"
          for variant in "${arr[@]}"; do
            echo "Dispatching render for variant: $variant"
            gh workflow run render-country.yml \
              --ref "${GITHUB_REF_NAME}" \
              -f country=Canada \
              -f variant="$variant"
          done
