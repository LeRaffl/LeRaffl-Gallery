name: Build manifest

on:
  push:
    paths:
      - 'images/**'                 # triggert bei neuen/gelöschten/verschobenen Dateien in images/
      - 'build_manifest.R'          # falls du den Builder änderst
      - 'R/render_schedule.R'       # falls der Schedule-Renderer geändert wird
      - '.github/workflows/fetch-*.yml'  # cron-Änderungen → Kalender neu bauen
  workflow_dispatch: {}             # optional: manuell auslösbar
  schedule:
    - cron: '17 3 * * *'            # optional: einmal täglich als Fallback (03:17 UTC)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write               # erlaubt das Committen von manifest.json
    concurrency:
      group: manifest-${{ github.ref }}
      cancel-in-progress: true      # vermeidet parallele Läufe bei vielen kleinen Pushes
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: jsonlite, stringr, dplyr, lubridate, purrr, fs, tibble, yaml

      - name: Build manifest
        run: |
          Rscript -e "source('build_manifest.R'); build_manifest(root='images', base_url='images/')"

      - name: Render schedule
        run: |
          Rscript -e "source('R/render_schedule.R'); build_schedule()"

      - name: Commit manifest + schedule
        uses: EndBug/add-and-commit@v9
        with:
          add: |
            manifest.json
            schedule.html
            schedule-*.html
            schedule.ics
          message: "chore: update manifest + schedule (CI)"
