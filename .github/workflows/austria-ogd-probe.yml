name: Austria OGD probe (temporary)

# Throwaway discovery workflow: verifies data.statistik.gv.at reachability from
# the GitHub Actions network and dumps the OGD dataset structure so we can build
# the real OGD-based fetcher. Delete once the migration in fetch_austria.py lands.

on:
  workflow_dispatch:
    inputs:
      datasets:
        description: 'Space-separated OGD dataset IDs to probe (optional)'
        required: false
        type: string

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Run OGD probe
        run: python scripts/_austria_ogd_probe.py ${{ inputs.datasets }}
